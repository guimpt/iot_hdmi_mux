substitutions:
  # Which HDMI port of your TV the switch output is plugged into.
  # Used as a fallback physical address (tv_port.0.0.0) until EDID auto-discovery
  # reads the real one from the TV over the DDC tap. Most users never need to change it.
  tv_port: "1"
  # Friendly names for the two HDMI inputs, shown in the source selector.
  source_a: "Input A"
  source_b: "Input B"

esphome:
  name: hdmi-switch
  friendly_name: HDMI Switch
  project:
    name: "guimpt.iot_hdmi_mux"
    version: "2.0.0"
  on_boot:
    priority: -100
    then:
      - lambda: |-
          gpio_reset_pin(GPIO_NUM_8);
          gpio_set_direction(GPIO_NUM_8, GPIO_MODE_OUTPUT);
          gpio_reset_pin(GPIO_NUM_2);
          gpio_set_direction(GPIO_NUM_2, GPIO_MODE_OUTPUT);
          gpio_reset_pin(GPIO_NUM_3);
          gpio_set_direction(GPIO_NUM_3, GPIO_MODE_OUTPUT);
          gpio_set_level(GPIO_NUM_8, 0);

          // Seed physical addresses from tv_port fallback if not yet discovered (NVS empty).
          if (id(pa_base) == 0) {
            int port = ${tv_port};
            uint16_t base = (uint16_t)(port << 12);
            id(pa_base) = base;
            id(pa_in_a) = base | 0x0100;
            id(pa_in_b) = base | 0x0200;
          }
          id(cec).set_physical_address(id(pa_base));
      # Give the TV/EDID a moment to settle, then read the real physical address.
      - delay: 3s
      - script.execute: discover_pa

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger:

api:

ota:
  platform: esphome

web_server:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "Hdmi-Switch Fallback Hotspot"
    password: "HDMI_SWITCH"

captive_portal:

# DDC tap: ESP32 reads the TV's EDID in parallel with the TS3DV642 pass-through.
i2c:
  id: ddc_bus
  sda: GPIO6
  scl: GPIO7
  frequency: 100kHz
  scan: false

globals:
  - id: pa_base
    type: uint16_t
    restore_value: true
    initial_value: "0"
  - id: pa_in_a
    type: uint16_t
    restore_value: true
    initial_value: "0"
  - id: pa_in_b
    type: uint16_t
    restore_value: true
    initial_value: "0"

external_components:
  - source: github://Palakis/esphome-native-hdmi-cec

# TV-side CEC bus (GPIO4). On v2.0 the three port CEC lines are bridged with 0R links,
# so a single bus is presented here.
# physical_address is a compile-time fallback (tv_port.0.0.0); discover_pa overrides it
# at runtime from the TV's EDID.
hdmi_cec:
  id: cec
  pin: GPIO4
  address: 0x05
  physical_address: 0x${tv_port}000
  osd_name: "HDMI Mux"
  promiscuous_mode: true
  monitor_mode: false
  on_message:
    - then:
        - lambda: |-
            auto frame = hdmi_cec::Frame(source, destination, data);
            id(cec_log).publish_state(frame.to_string(true));
    - opcode: 0x86
      then:
        - lambda: |-
            uint16_t addr = (data[1] << 8) | data[2];
            if (addr == id(pa_in_a))
              id(hdmi_switch_select).make_call().set_option("${source_a}").perform();
            else if (addr == id(pa_in_b))
              id(hdmi_switch_select).make_call().set_option("${source_b}").perform();
    - opcode: 0x85
      then:
        - lambda: |-
            uint16_t addr = 0;
            if (id(hdmi_switch_select).state == "${source_a}") addr = id(pa_in_a);
            else if (id(hdmi_switch_select).state == "${source_b}") addr = id(pa_in_b);
            if (addr != 0) {
              id(cec).send(id(cec).address(), 0xF,
                std::vector<uint8_t>{0x82, (uint8_t)(addr >> 8), (uint8_t)(addr & 0xFF)});
            }
    - opcode: 0x36
      source: 0x0
      destination: 0xF
      then:
        - select.set:
            id: hdmi_switch_select
            option: "Off"
    - opcode: 0x90
      source: 0x0
      then:
        - lambda: |-
            bool on = (data[1] == 0x00 || data[1] == 0x02);
            id(tv_power).publish_state(on);

script:
  # Read the TV's EDID over the DDC tap and extract the HDMI physical address.
  - id: discover_pa
    then:
      - lambda: |-
          auto *bus = id(ddc_bus);
          uint8_t edid[256];

          // EDID block 0 (set byte offset, then read 128 bytes from 0x50).
          uint8_t off0 = 0x00;
          if (bus->write(0x50, &off0, 1, false) != i2c::ERROR_OK) { ESP_LOGW("EDID", "block0 offset write failed"); return; }
          if (bus->read(0x50, edid, 128) != i2c::ERROR_OK) { ESP_LOGW("EDID", "block0 read failed"); return; }

          static const uint8_t hdr[8] = {0x00, 0xFF, 0xFF, 0xFF, 0xFF, 0xFF, 0xFF, 0x00};
          for (int k = 0; k < 8; k++) {
            if (edid[k] != hdr[k]) { ESP_LOGW("EDID", "bad header"); return; }
          }
          if (edid[0x7E] == 0) { ESP_LOGW("EDID", "no CEA extension block"); return; }

          // EDID block 1 (CEA-861 extension, where the HDMI VSDB lives).
          uint8_t off1 = 0x80;
          if (bus->write(0x50, &off1, 1, false) != i2c::ERROR_OK) { ESP_LOGW("EDID", "block1 offset write failed"); return; }
          if (bus->read(0x50, edid + 128, 128) != i2c::ERROR_OK) { ESP_LOGW("EDID", "block1 read failed"); return; }

          uint8_t *cea = edid + 128;
          if (cea[0] != 0x02) { ESP_LOGW("EDID", "not a CEA-861 extension"); return; }
          uint8_t dtd = cea[2];
          if (dtd < 5) { ESP_LOGW("EDID", "no data block collection"); return; }

          // Walk the CEA data blocks looking for the HDMI VSDB (IEEE OUI 00-0C-03).
          uint16_t pa = 0xFFFF;
          uint8_t i = 4;
          while (i < dtd) {
            uint8_t tag = (cea[i] >> 5) & 0x07;
            uint8_t len = cea[i] & 0x1F;
            if (tag == 3 && len >= 5 && cea[i+1] == 0x03 && cea[i+2] == 0x0C && cea[i+3] == 0x00) {
              pa = (cea[i+4] << 8) | cea[i+5];
              break;
            }
            i += 1 + len;
          }
          if (pa == 0xFFFF) { ESP_LOGW("EDID", "no HDMI VSDB / physical address found"); return; }

          char buf[12];
          snprintf(buf, sizeof(buf), "%X.%X.%X.%X", (pa >> 12) & 0xF, (pa >> 8) & 0xF, (pa >> 4) & 0xF, pa & 0xF);
          id(cec_pa).publish_state(buf);  // always reflect a successful read, even if it matches the fallback

          if (pa == id(pa_base)) {
            ESP_LOGD("EDID", "Physical address unchanged (%s)", buf);
            return;
          }

          // Derive child addresses by filling the highest-order free nibble.
          uint16_t child;
          if ((pa & 0x0FFF) == 0) child = 0x0100;
          else if ((pa & 0x00FF) == 0) child = 0x0010;
          else if ((pa & 0x000F) == 0) child = 0x0001;
          else child = 0;

          id(pa_base) = pa;
          id(pa_in_a) = pa | (uint16_t)(1 * child);
          id(pa_in_b) = pa | (uint16_t)(2 * child);
          id(cec).set_physical_address(pa);

          // Announce the (corrected) address to the bus.
          id(cec).send(id(cec).address(), 0xF,
            std::vector<uint8_t>{0x84, (uint8_t)(pa >> 8), (uint8_t)(pa & 0xFF), 0x05});
          ESP_LOGI("EDID", "Discovered physical address %s", buf);

interval:
  - interval: 30s
    then:
      - script.execute: discover_pa

select:
  - platform: template
    name: "HDMI Switch"
    id: hdmi_switch_select
    icon: "mdi:hdmi-port"
    optimistic: true
    options:
      - "Off"
      - "${source_a}"
      - "${source_b}"
    set_action:
      - lambda: |-
          if (x == "Off") {
            gpio_set_level(GPIO_NUM_8, 0);
          } else if (x == "${source_a}") {
            gpio_set_level(GPIO_NUM_8, 1);
            gpio_set_level(GPIO_NUM_2, 1);
            gpio_set_level(GPIO_NUM_3, 0);
          } else if (x == "${source_b}") {
            gpio_set_level(GPIO_NUM_8, 1);
            gpio_set_level(GPIO_NUM_2, 1);
            gpio_set_level(GPIO_NUM_3, 1);
          }
          ESP_LOGI("HDMI", "Switch set to %s", x.c_str());
      - if:
          condition:
            lambda: 'return x == "${source_a}";'
          then:
            - lambda: |-
                uint16_t a = id(pa_in_a);
                id(cec).send(id(cec).address(), 0xF,
                  std::vector<uint8_t>{0x82, (uint8_t)(a >> 8), (uint8_t)(a & 0xFF)});
            - hdmi_cec.send:
                destination: 0x0
                data: [0x04]
      - if:
          condition:
            lambda: 'return x == "${source_b}";'
          then:
            - lambda: |-
                uint16_t b = id(pa_in_b);
                id(cec).send(id(cec).address(), 0xF,
                  std::vector<uint8_t>{0x82, (uint8_t)(b >> 8), (uint8_t)(b & 0xFF)});
            - hdmi_cec.send:
                destination: 0x0
                data: [0x04]

button:
  - platform: template
    name: "TV Power On"
    icon: "mdi:television"
    on_press:
      - hdmi_cec.send:
          destination: 0x0
          data: [0x04]
  - platform: template
    name: "TV Standby"
    icon: "mdi:power-standby"
    on_press:
      - hdmi_cec.send:
          destination: 0x0
          data: [0x36]

text_sensor:
  - platform: template
    name: "CEC Log"
    id: cec_log
    icon: "mdi:message-text-outline"
    entity_category: diagnostic
  - platform: template
    name: "CEC Physical Address"
    id: cec_pa
    icon: "mdi:identifier"
    entity_category: diagnostic

binary_sensor:
  - platform: template
    name: "TV Power"
    id: tv_power
    device_class: power
